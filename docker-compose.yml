# Seraphim - autonomous developer agent.
#
# `docker compose up -d` brings up the whole stack: Postgres, the Rust API
# (the orchestrator brain), the SvelteKit kanban UI, the long-lived agent
# workspace sandbox, and a Tailscale node that exposes the UI over your tailnet.
#
# Secrets and host-specific paths live in `.env` (see `.env.example`).

name: seraphim

services:
  postgres:
    container_name: seraphim-postgres
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - seraphim
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    container_name: seraphim-api
    build:
      context: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GH_TOKEN: ${GH_TOKEN}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      CLAUDE_MODEL: ${CLAUDE_MODEL}
      ORG_NAME: ${ORG_NAME}
      API_BIND: 0.0.0.0:27182
      # Name of the workspace container the API drives via `docker exec`.
      WORKSPACE_CONTAINER: seraphim-workspace
      RUST_LOG: info,seraphim_api=debug
    ports:
      - "${API_PORT}:27182"
    volumes:
      # The API controls the workspace container through the host Docker daemon.
      - ${DOCKER_SOCKET}:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - seraphim
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:27182/api/v1/ping || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    container_name: seraphim-frontend
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      # Server-side base URL the SvelteKit proxy uses to reach the API.
      API_ORIGIN: http://api:27182
      PORT: "31415"
    ports:
      - "${FRONTEND_PORT}:31415"
    depends_on:
      - api
    networks:
      - seraphim

  workspace:
    container_name: seraphim-workspace
    build:
      context: ./workspace
    # Tag the built image so the API can recreate the container from it on demand.
    image: seraphim-workspace:latest
    restart: unless-stopped
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      GH_TOKEN: ${GH_TOKEN}
      # Writable, persistent config dir seeded from the read-only host mount.
      CLAUDE_CONFIG_DIR: /workspace/.claude
    volumes:
      # Persistent agent home: cloned repos + the single Claude conversation.
      - workspace-data:/workspace
      # Host ~/.ssh, read-only: keys for cloning git@ SSH repos.
      - ${SSH_HOME}:/host-ssh:ro
      # Lets the agent run docker/earthly for the repos it works on.
      - ${DOCKER_SOCKET}:/var/run/docker.sock
    networks:
      - seraphim

  tailscale:
    container_name: seraphim-tailscale
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: ${TS_HOSTNAME}
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_HOSTNAME: ${TS_HOSTNAME}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "true"
      # Serve config proxies the tailnet HTTPS endpoint to the UI and API.
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale/serve.json:/config/serve.json:ro
    depends_on:
      - frontend
      - api
    networks:
      - seraphim

networks:
  seraphim:
    driver: bridge

volumes:
  postgres-data:
  workspace-data:
  tailscale-state:
