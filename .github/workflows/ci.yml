name: CI

# Test every pull request and every push to the long-lived branches.
on:
  pull_request:
  push:
    branches: [main, develop]

# Don't pile up redundant runs for the same ref; a newer push supersedes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # The three jobs are independent, so a failure in one never short-circuits the
  # others ("no fail fast"). Within a job, checks use `if: ${{ !cancelled() }}`
  # so a formatting failure still lets the tests run and report.

  api:
    name: API (Rust)
    runs-on: [self-hosted, Linux, X64, fedora]
    defaults:
      run:
        working-directory: api

    # Disposable Postgres for the migration check below. sqlx uses runtime
    # queries, so a broken or duplicate migration (a repeated version number, a
    # typo in an ALTER TABLE) compiles and tests green and only fails at API
    # boot on a real deploy. Applying the embedded migrations to a real database
    # here catches that in the PR. Mapped to host port 5433 (not the default
    # 5432) so it never collides with a dev Postgres on the shared self-hosted
    # runner. The container is torn down with the job, so every run is clean.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: seraphim
          POSTGRES_PASSWORD: seraphim
          POSTGRES_DB: seraphim_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U seraphim -d seraphim_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      # The runner is self-hosted, so $HOME survives between jobs while the
      # checked-out tree does not: actions/checkout runs `git clean -ffdx`, which
      # deletes the gitignored api/target every run. Point Cargo's build output at
      # a stable path under $HOME so incremental compiles persist locally, with no
      # multi-hundred-MB cache upload/download per run. ~/.cargo/{registry,git}
      # already live in $HOME and persist for free. rust-toolchain.toml pins the
      # channel (1.88); rustup installs it on the first cargo invocation.
      - name: Persist Cargo build output outside the workspace
        run: echo "CARGO_TARGET_DIR=$HOME/.cache/seraphim/cargo-target" >> "$GITHUB_ENV"

      - name: Format
        if: ${{ !cancelled() }}
        run: cargo fmt --check

      - name: Clippy
        if: ${{ !cancelled() }}
        run: cargo clippy --all-targets --all-features

      - name: Test
        if: ${{ !cancelled() }}
        run: cargo test --all-features

      # Apply the embedded migrations to the throwaway Postgres above. Runs the
      # same `sqlx::migrate!("./migrations")` set the API runs at boot, so a
      # broken migration fails here instead of on a real deploy.
      - name: Migrate (throwaway Postgres)
        if: ${{ !cancelled() }}
        env:
          DATABASE_URL: postgres://seraphim:seraphim@localhost:5433/seraphim_test
        run: cargo run --bin migrate

  frontend:
    name: Frontend (SvelteKit)
    runs-on: [self-hosted, Linux, X64, fedora]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # The frontend uses Yarn Berry (see frontend/package.json `packageManager`),
      # enabled through Corepack which ships with Node.
      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Type-check
        if: ${{ !cancelled() }}
        run: yarn check

      - name: Build
        if: ${{ !cancelled() }}
        run: yarn build

  images:
    name: Docker images
    runs-on: [self-hosted, Linux, X64, fedora]
    steps:
      - uses: actions/checkout@v4

      # `docker compose build` reads the file's variable interpolation; provide
      # placeholders so it parses cleanly. (Build needs no real secrets.)
      - name: Provide placeholder env
        run: cp .env.example .env

      - name: Build images
        run: docker compose build api frontend workspace
